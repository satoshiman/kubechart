# Test resources for kubechart Phase 2
# This file contains all resource types to test the full implementation
# Apply with: kubectl apply -f test-resources.yaml

---
# Namespace for testing
apiVersion: v1
kind: Namespace
metadata:
  name: kubechart-test

---
# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-deployment
  namespace: kubechart-test
spec:
  replicas: 2
  selector:
    matchLabels:
      app: test-app
  template:
    metadata:
      labels:
        app: test-app
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80

---
# StatefulSet
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: test-statefulset
  namespace: kubechart-test
spec:
  serviceName: test-statefulset-svc
  replicas: 2
  selector:
    matchLabels:
      app: stateful-app
  template:
    metadata:
      labels:
        app: stateful-app
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80

---
# DaemonSet
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: test-daemonset
  namespace: kubechart-test
spec:
  selector:
    matchLabels:
      app: daemon-app
  template:
    metadata:
      labels:
        app: daemon-app
    spec:
      containers:
      - name: pause
        image: registry.k8s.io/pause:3.9

---
# Job
apiVersion: batch/v1
kind: Job
metadata:
  name: test-job
  namespace: kubechart-test
spec:
  template:
    metadata:
      labels:
        app: job-app
    spec:
      containers:
      - name: busybox
        image: busybox:1.36
        command:
        - sh
        - -c
        - echo "Hello from Job" && sleep 5
      restartPolicy: OnFailure

---
# CronJob
apiVersion: batch/v1
kind: CronJob
metadata:
  name: test-cronjob
  namespace: kubechart-test
spec:
  schedule: "*/5 * * * *"
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: cronjob-app
        spec:
          containers:
          - name: busybox
            image: busybox:1.36
            command:
            - sh
            - -c
            - echo "Hello from CronJob" && sleep 3
          restartPolicy: OnFailure

---
# Service - ClusterIP
apiVersion: v1
kind: Service
metadata:
  name: test-clusterip-svc
  namespace: kubechart-test
spec:
  type: ClusterIP
  selector:
    app: test-app
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP

---
# Service - NodePort
apiVersion: v1
kind: Service
metadata:
  name: test-nodeport-svc
  namespace: kubechart-test
spec:
  type: NodePort
  selector:
    app: test-app
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30080
    protocol: TCP

---
# Service - LoadBalancer (will show as pending in minikube)
apiVersion: v1
kind: Service
metadata:
  name: test-loadbalancer-svc
  namespace: kubechart-test
spec:
  type: LoadBalancer
  selector:
    app: test-app
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP

---
# Ingress (without TLS)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: test-ingress
  namespace: kubechart-test
spec:
  rules:
  - host: test.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: test-clusterip-svc
            port:
              number: 80

---
# Ingress (with TLS) - requires a secret, will show TLS indicator
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: test-ingress-tls
  namespace: kubechart-test
spec:
  tls:
  - hosts:
    - secure.local
    secretName: test-tls-secret
  rules:
  - host: secure.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: test-clusterip-svc
            port:
              number: 80

---
# ConfigMap (optional, not displayed in tree but useful for testing)
apiVersion: v1
kind: ConfigMap
metadata:
  name: test-config
  namespace: kubechart-test
data:
  key1: value1
  key2: value2
