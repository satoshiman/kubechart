name: Test, Build and Publish to npm

on:
  push:
    branches:
      - main
      - master
  release:
    types: [published]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

  publish:
    needs: test-and-build
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && github.event.action == 'published'

    permissions:
      id-token: write
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Bump version and publish
        run: |
          # Detect version bump type from release tag
          if [[ "${{ github.event.release.tag_name }}" == *"major"* ]]; then
            npm version major -m "Bump version to %s"
          elif [[ "${{ github.event.release.tag_name }}" == *"minor"* ]]; then
            npm version minor -m "Bump version to %s"
          else
            npm version patch -m "Bump version to %s"
          fi
          npm publish
          git push --follow-tags
